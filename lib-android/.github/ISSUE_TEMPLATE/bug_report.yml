name: Bug Report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
        Please fill in as much detail as possible to help us reproduce and fix the issue quickly.

  - type: input
    id: version
    attributes:
      label: Library version
      description: Which version of android-pdf-viewer are you using?
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android version & device
      description: What device / emulator and Android version are you on?
      placeholder: "e.g. Pixel 7 – Android 14 (API 34)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
      placeholder: "When I call loadUrl() with a large PDF, the app crashes with..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Create PdfViewer in layout
        2. Call `pdfViewer.loadUrl("https://...")`
        3. Scroll to page 10
        4. See crash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logcat
    attributes:
      label: Logcat output
      description: |
        Filter by tag `PdfViewer`. Paste relevant output here.
      render: text
      placeholder: |
        E/PdfViewer: Error loading PDF: ...

  - type: textarea
    id: code
    attributes:
      label: Minimal code snippet
      description: Paste the minimal Kotlin/XML code that reproduces the issue.
      render: kotlin

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, recordings, or any other relevant info.
