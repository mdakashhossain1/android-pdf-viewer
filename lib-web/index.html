<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>Advanced PDF Viewer</title>

  <!-- Styles -->
  <link rel="stylesheet" href="pdf-viewer.css">

  <style>
    /* Demo page chrome */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #1e1e2e;
    }

    #pdf-viewer-container {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<!-- ===== THE VIEWER ===== -->
<div id="pdf-viewer-container"></div>

<script src="pdf-viewer.js"></script>

<script>
  const viewer = new AdvancedPDFViewer('#pdf-viewer-container', {
    darkMode:         false,          // start in light mode
    sidebarOpen:      true,           // sidebar visible by default
    sidebarTab:       'thumbs',       // show thumbnails tab
    zoom:             'fitWidth',     // initial zoom mode
    renderTextLayer:  true,           // needed for search & copy
    thumbSize:        160,            // thumbnail width px
    enableDrop:       true,           // drag & drop PDF files
    enableKeyboard:   true,           // keyboard shortcuts
    onLoad: (pdf) => {
      console.log('PDF loaded:', pdf.numPages, 'pages');
    },
    onPageChange: (page, total) => {
      // console.log(`Page ${page} / ${total}`);
    },
    onError: (err) => {
      console.error('PDF error:', err);
    }
  });

  window.pdfViewer = viewer;
</script>
</body>
</html>
