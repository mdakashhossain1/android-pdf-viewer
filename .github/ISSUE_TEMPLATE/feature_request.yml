name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!
        Please describe your idea clearly so we can evaluate and prioritize it.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this feature solve? What use case drives this request?
      placeholder: "When displaying PDFs in a document review app, users need to highlight text..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: |
        Describe the feature you'd like. Include proposed API signatures if applicable.
      placeholder: |
        Add an `addAnnotation(page, rect, color)` method that draws a semi-transparent
        highlight rectangle over the specified page region.

        ```kotlin
        pdfViewer.addAnnotation(
            page  = 3,
            rect  = RectF(100f, 200f, 400f, 220f),
            color = Color.YELLOW,
        )
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or alternative approaches?

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important — blocks a real use case
        - Critical — blocking production usage
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, references, or links to similar implementations.
